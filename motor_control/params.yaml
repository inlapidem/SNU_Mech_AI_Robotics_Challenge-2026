/motor_bridge:
  ros__parameters:
    port: /dev/ttyACM0
    baud: 115200
    # --- 로봇 실측값으로 채우세요 ---
    wheel_radius: 0.033       # 바퀴 반지름 [m]
    wheel_base: 0.382         # ★실측 보정 (2026-07-20, run_field_test.py --only pivot).
                              # 기하 실측은 360mm 인데, 제자리 360도 회전 명령 시
                              # 오도메트리가 360도라 보고할 때 실제는 340도만 돌았다
                              # (과대 1.06배). dtheta=(dr-dl)/wheel_base 이므로
                              # wheel_base 를 1.06배(0.382)로 키우면 회전각이 맞는다.
                              # 기하값보다 큰 것은 회전 시 바퀴가 살짝 미끄러지기
                              # 때문(유효 트랙폭 > 물리 트랙폭). 바닥이 바뀌면 재측정.
                              # 이전값 0.36 (기하 실측).
    ticks_per_rev: 1317.0     # ★실측 반영 (2026-07-20, measure_dynamics.py --mode 줄자검증)
                              # 공칭 1441(=11 PPR x 기어비 131)로 재니 엔코더가 25.6cm,
                              # 줄자 실측은 28.0cm — 엔코더가 9% '짧게' 읽었다.
                              # 미끄럼이면 반대로 길게 읽히므로 이건 마찰이 아니라
                              # 기하 상수 오차다(실기어비가 131이 아니라 ~120이거나
                              # 바퀴 반경이 33mm보다 큼). 따라서 바닥이 바뀌어도 유효.
                              # 이전값 1441.0 — 되돌리려면 이 값을 쓸 것.
                              # 재확인 권장: 1m 직진으로 표본 늘리기 (28cm 1회 표본이라
                              # 줄자 오차 +-1cm 가 그대로 +-3.6% 로 들어온다).
    max_wheel_speed: 0.25     # ⚠잠정 — PWM 255 실측 0.250 m/s (2026-07-20).
                              # ★단, 경기장 바닥이 아닌 유사 재질에서 측정했다.
                              # 바닥 마찰에 따라 바뀌므로 경기장에서 재측정할 것.
                              # 참고: 이전 추정치 0.2 (기어비+RPM 역산)와 25% 차이.
                              # sim/explore_sim.py 가 쓰던 0.73 은 근거 없는 가정이었고
                              # 실제의 2.9배였다 — 시간예산 계산을 전부 그르쳤다.
    dry_run: false            # true면 하드웨어 없이 계산만 (테스트용)
    # --- 폐루프 PI 속도제어 (벤치 검증 후 true 로) ---
    closed_loop: true         # ★실측 근거로 켬 (2026-07-20). 개루프는 직진이 안 된다.
                              # measure_dynamics.py 실측: 오른쪽 모터가 왼쪽보다 일관되게
                              # 느리다 (PWM 80 에서 -20.6%, 255 에서 -9.4%).
                              # 이걸 곡률로 환산하면 PWM 255 에서 회전반경 -3.83m,
                              # 즉 반납구역까지 3.5m 가는 동안 52도 휜다. PWM 140 이면
                              # 112도. 저속일수록 심해서 정렬/푸시 구간이 가장 취약하다.
                              # (2026-07 초 '시작하자마자 우회전해 꼭짓점으로 간다' 는
                              #  현상의 원인 중 하나. 라이다 180도 오장착과는 별개 문제.)
                              # ⚠ 켠 뒤 반드시 measure_dynamics.py 로 편차가 실제로
                              #   줄었는지 확인할 것. 진동하면 pid_kp 를 낮춘다.
    pid_kp: 350.0             # PWM per (m/s 오차). 진동하면 낮추고, 느리면 올림
    pid_ki: 900.0
    min_pwm: 50               # ⚠잠정 — 실측 정지마찰 하한 (2026-07-20). 이전값 22.
                              # PWM 15부터 5씩 올리며 확인: 45까지 0틱, 50에서 회전 시작.
                              # ★바닥 마찰 의존이라 경기장에서 재측정 권장.
                              # 파급: deployment/explore_demo.py 의 pwm_slow 49.5 가
                              # 이 문턱 바로 아래라 감속 구간에서 정지한다 — 확인 필요.
    control_rate: 50.0
    cmd_timeout: 0.5          # cmd_vel 이 이 시간 끊기면 정지 (펌웨어 300ms 와 이중 안전)
    # --- 빈 IR 안착 센서 (펌웨어 v2: "E l r ir" 3번째 필드) ---
    ir_active_low: true       # 감지(물체 있음) 시 LOW 출력인 모듈이면 true
