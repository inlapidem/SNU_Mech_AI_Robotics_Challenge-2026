/motor_bridge:
  ros__parameters:
    port: /dev/ttyACM0
    baud: 115200
    # --- 로봇 실측값으로 채우세요 ---
    wheel_radius: 0.033       # 바퀴 반지름 [m]
    wheel_base: 0.35          # 좌우 바퀴 간격 [m]
    ticks_per_rev: 1441.0     # 바퀴 1회전당 카운트 = 11 PPR x 1(펌웨어 A상 RISING만, 1x) x 기어비 131
                              # 주의: "131:1"은 공칭값(실제 131.25 등 소수 기어비인 제품 多).
                              # 최종 확인은 1m 직진 후 오도메트리 거리 비교로.
    max_wheel_speed: 0.2      # PWM 255일 때 대략 바퀴 속도 [m/s] — 미실측 추정치.
                              # 기어비 131 + 12V 기어드모터(520/37D급) 무부하 45~76RPM
                              # -> 0.16~0.26 m/s. 펌웨어가 개루프 PWM이라 이 값이 크면
                              # 저속 명령이 과소 PWM으로 나가 정지마찰에 걸림.
                              # 실측: PWM 255로 1초 직진, 엔코더 거리/시간으로 갱신.
    dry_run: false            # true면 하드웨어 없이 계산만 (테스트용)
    # --- 폐루프 PI 속도제어 (벤치 검증 후 true 로) ---
    closed_loop: false        # true: 엔코더 피드백 PI — 저속 정렬/푸시 정밀도 개선
    pid_kp: 350.0             # PWM per (m/s 오차). 진동하면 낮추고, 느리면 올림
    pid_ki: 900.0
    min_pwm: 22               # 정지마찰 극복 최저 PWM (바퀴 안 돌기 시작하는 값 실측)
    control_rate: 50.0
    cmd_timeout: 0.5          # cmd_vel 이 이 시간 끊기면 정지 (펌웨어 300ms 와 이중 안전)
    # --- 빈 IR 안착 센서 (펌웨어 v2: "E l r ir" 3번째 필드) ---
    ir_active_low: true       # 감지(물체 있음) 시 LOW 출력인 모듈이면 true
