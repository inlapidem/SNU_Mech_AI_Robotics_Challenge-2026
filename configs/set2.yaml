# ============================================================================
# Set 2 perception config - upright white cubes with fruit images on the top and
# two opposite side faces, in
# the same 4x4 m arena. SEPARATE from Set 1 (own dataset, models, thresholds,
# runtime policy). Every tunable for the Isaac Sim data generation lives here so
# the sim files stay generic. Edit values to match the real cubes / arena.
# ============================================================================

set: set2

classes:
  fruits: [apple, orange, banana, pineapple]   # classifier fruit classes
  detector: [cube_candidate]                   # detector: single class
  unknown: unknown                             # classifier reject class

# --------------------------------------------------------------------------- assets
# Fruit images used as randomized printed/sticker labels. The allowlist deliberately
# keeps only ordinary, whole/unpeeled fruit with canonical colours; sliced/peeled
# source assets remain in the repository but are never sampled by Isaac Sim.
assets:
  fruit_texture_dir: assets/fruit_textures   # <dir>/<fruit>/*.png|jpg
  fruit_texture_allowlist:
    # Real photos of ordinary whole/unpeeled fruit only. Illustrations and sliced/
    # peeled examples remain in assets but are intentionally excluded here.
    apple: [apple1.jpg, apple2.jpg, apple4.png, apple5.png, apple7.jpg, apple8.jpg,
            apple9.jpg, apple10.jpg]
    orange: [orange1.jpg, orange3.jpg, orange5.jpg, orange6.jpg, orange7.jpg,
             orange9.jpg]
    banana: [banana1.jpg, banana4.png, banana5.jpg, banana6.jpg]
    pineapple: [pineapple1.jpg, pineapple2.jpg, pineapple3.png, pineapple4.jpg,
                pineapple5.jpg, pineapple6.jpg, pineapple8.png, pineapple9.jpg,
                pineapple10.jpg]
  # Optional: a cube body USD (e.g. converted from a real cube STL). If null/missing
  # the generator builds a clean procedural box (preferred for per-face texturing).
  cube_usd: null

# --------------------------------------------------------------------------- arena (shared shape with set1)
# REAL VENUE: bright wood-laminate walls AND floor, taegukgi stickers AT THE GOAL/
# STORAGE CORNER ONLY (its floor + the two adjacent walls), black tape lines.
# The taeguk red/blue circle is a key false-positive hazard for the fruit classifier
# (real 0714 frames: wall taegukgi accepted as apple 0.941 before hard-neg retraining).
arena:
  size_x: 4.0
  size_y: 4.0
  wall_height: 0.3                     # rulebook v2: 30 cm fence
  wall_thickness: 0.05
  texture_dir: assets/arena_textures   # wood/*.png + stickers/*.png (make_arena_textures.py)
  wood_brightness: [0.75, 1.15]
  # Real venue photos (real_floor_*/real_wall_*) form surface-specific pools; this is
  # the per-surface per-frame probability of using one over a procedural wood_* file:
  real_texture_frac: 0.7
  # Solid-colour FALLBACK (only used when texture_dir has no wood files):
  floor_color: [0.78, 0.62, 0.42]
  floor_color_jitter: 0.08
  floor_roughness: [0.5, 0.9]
  wall_color: [0.78, 0.62, 0.42]
  wall_color_jitter: 0.08
  wall_roughness: [0.4, 0.8]
  stickers:                            # split by filename: *taegukgi* vs the rest
    pool: 8
    taegukgi_floor_count: [1, 2]       # goal-corner floor (at least one every frame)
    taegukgi_wall_count: [1, 2]        # S/W goal-corner walls (at least one every frame)
    taegukgi_size_m: [0.15, 0.30]
    goal_zone_extent_m: 0.55           # floor taegukgi lie within this of the corner
    wall_extent_m: 1.0                 # wall taegukgi within this along-wall of the corner
    generic_count: [0, 3]              # non-flag labels: floor only, anywhere
    size_m: [0.08, 0.20]
  tape:
    enable: true
    width_m: [0.015, 0.025]
    color: [0.05, 0.05, 0.05]
    color_jitter: 0.05
    zone_squares: true
    pool_runs: 4
    n_random_runs: [1, 4]
  spawn_margin: 0.35

# ------------------------------------------------------------- placement/camera sampling
sampling:
  cam_dist_near: [0.3, 1.5]   # m, classify range
  cam_dist_far: [1.5, 3.8]    # m, long-range detection views
  far_frac: 0.45
  wall_contact_frac: 0.35     # white cube against bright wood wall, touching allowed
  wall_gap_m: [0.30, 0.60]
  negative_frame_frac: 0.10   # cube-free frames (wood/sticker/tape only), empty labels
  negative_goal_frac: 0.5     # of those, fraction aimed at the goal-corner taegukgi

# --------------------------------------------------------------------------- camera (NUROUM V11) - identical rig to set1
camera:
  width: 1280
  height: 720
  hfov_deg: 90.0
  focal_length: 10.4775
  horizontal_aperture: 20.955
  fx: 640.0
  fy: 640.0
  cx: 640.0
  cy: 360.0

# --------------------------------------------------------------------------- robot sensor rig (identical to set1)
robot:
  base_height: 0.0
  cam_height: 0.20
  cam_forward_offset: 0.10
  cam_lateral_offset: 0.15
  cam_pitch_deg: -20.0
  cam_yaw_outward_deg: 30.0
  lidar_height: 0.30
  occlusion_proxy: false
  jitter:
    height: [-0.01, 0.01]
    pitch_deg: [-7.0, 7.0]     # -> effective pitch -13..-27 deg
    yaw_deg: [-3.0, 3.0]
    roll_deg: [-2.0, 2.0]

# --------------------------------------------------------------------------- cubes / placement
cubes:
  size_m: 0.08                 # real cube edge length (8 cm)
  size_jitter_m: 0.005         # per-frame edge variation
  count_range: [1, 4]          # cubes present per frame
  n_plain: 0                   # plain (no-fruit) white cubes; 0 = only fruit cubes in the arena
                               # (white-face 'unknown' crops still come from fruit cubes' 3 plain faces)
  fruit_faces: 3               # invariant real layout: top + opposite side pair
  fruit_face_names: [pz, px, nx]
  upright_tilt_deg: [-2.0, 2.0] # upright on the bottom; tiny physical settle variation only
  # White 3D-printed plastic body (UsdPreviewSurface).
  body_material:
    base_color: [0.88, 0.88, 0.88]
    color_jitter: 0.06
    roughness: [0.35, 0.7]
    metallic: 0.0
  # Rulebook v2: BOTH sets (28 objects) share the arena during the match, so the Set 1
  # polyhedra ARE present and are trained as unlabelled hard negatives (they appear in
  # the images but never get a 'cube_candidate' box, teaching the detector NOT to fire
  # on them; their crops also become classifier 'unknown' samples).
  use_noncube_negatives: true         # add octa/dodeca/icosa as hard negatives
  set1_usd_dir: isaac/assets/usd      # where those USDs live (only used if the flag is true)
  neg_size_m: 0.08                    # rendered size of non-cube negatives (if enabled);
                                      # they now REST on the floor like the Set 1 solids

# --------------------------------------------------------------------------- fruit label (printed/sticker) realism
# A fruit image is rendered as a thin textured decal sitting flush on a face,
# simulating a printed/sticker label rather than a clean digital texture.
fruit_label:
  scale_frac: [0.55, 0.92]     # label size as fraction of the face edge
  offset_frac: 0.12            # random center offset on the face (+-frac of edge)
  rotation_deg: [-8, 8]        # in-plane misalignment
  border_frac: [0.0, 0.10]     # paper/sticker white border (fraction of label)
  raise_eps_m: 0.0008          # lift above the face to avoid z-fighting
  # Hue-preserving printed-look exposure jitter via the texture scale/bias inputs:
  brightness: [0.8, 1.15]
  contrast: [0.85, 1.15]
  glare_prob: 0.25             # chance of a brighter specular label material
  roughness: [0.3, 0.7]

# --------------------------------------------------------------------------- real-capture ArUco compositing
# Markers printed on the real cubes' 3 "fruit" faces for the sim->real pipeline:
# detect quad -> solvePnP facing -> composite a fruit texture over it -> auto-label
# with the same labeling gates as the synthetic generator (see `labeling:` below).
aruco:
  dictionary: DICT_4X4_50      # low bit count -> readable at small pixel sizes
  marker_size_m: 0.050         # printed marker edge, outer black border (62.5% of face)
  face_size_m: 0.080           # cut square = full cube face (6C1.STL: 80 mm, 1 mm chamfers)
  n_cubes: 4                   # cube k carries ids [3k, 3k+1, 3k+2]
  faces_per_cube: 3
  # Composite label size range (fraction of face edge). Lower bound must keep the
  # pasted label able to fully cover the 62.5% marker: offset <= (scale - 0.625)/2.
  composite_scale_frac: [0.68, 0.92]

# --------------------------------------------------------------------------- lighting / DR (shared with set1)
lighting:
  sun_intensity: [2000, 9000]
  sun_pitch_deg: [-70, -20]
  sun_yaw_deg: [-180, 180]
  dome_intensity: [600, 2500]
  color_temp: [4000, 8000]

postprocess:
  motion_blur: true
  gaussian_noise: true
  exposure_jitter: true

# --------------------------------------------------------------------------- dataset output
dataset:
  root: datasets/set2_v3      # v3 = real venue photos + exact floor resting + goal-corner
                              # taegukgi policy (v2 kept - the LR training mixes cite it)
  detector_subdir: detector
  classifier_subdir: classifier
  metadata_subdir: metadata
  val_ratio: 0.15
  min_frame_brightness: 12

# Rules that turn a detected cube into a classifier sample vs `unknown`. The label
# is based on VISIBLE FRUIT EVIDENCE (analytic face-facing + projected fruit area),
# never on the cube's hidden physical identity.
labeling:
  detector_min_box_px: 8          # detector keeps boxes down to here (high recall)
  min_box_px: 36                  # min(w,h) px for a crop to be eligible for a fruit label
  min_visible_frac: 0.55          # 1 - occlusionRatio of the cube box
  max_truncation_px: 2            # cube box this close to the image border = truncated
  # Fruit-evidence gates (ALL must hold for a fruit-class label, else -> unknown):
  min_fruit_face_facing: 0.30     # max over fruit faces of (-normal . view_dir), 0..1
  min_fruit_area_ratio: 0.08      # visible fruit pixel area / cube box pixel area
  min_fruit_box_px: 10            # min(w,h) px of the visible fruit region
  # Classifier crop augmentation (simulate detector imperfection):
  crop_margin_frac: [-0.08, 0.20]
  crop_shift_frac: 0.10
  crops_per_object: 2
  # Hard-but-identifiable share: keep some borderline-but-clear fruit views as the
  # fruit class (not unknown) so the classifier still recognizes harder real views.
  hard_positive_keep: 0.5
  # Unknown labels stay conservative; these probabilities only thin redundant
  # classifier crops. The objects/scenes and detector labels are never removed.
  unknown_crop_keep:
    small_cube: 0.10              # far/tiny cube crops are highly repetitive
    noncube: 0.05                 # 3 Set 1 solids/frame; thousands remain at full scale
    distractor_or_white: 1.0      # core white-face/plain-cube rejection case
    occluded: 0.40                # retain a diverse safety-relevant subset
    truncated: 1.0
    no_visible_fruit: 0.40
    borderline: 0.50
  unknown_target_frac: [0.40, 0.45] # post-run QC target (reported, not forced)
  # Extra explicit unknown source:
  background_unknown_frac: 0.05   # saved frames that also emit a background crop

render:
  rt_subframes: 32

# --------------------------------------------------------------------------- sensor rig (deployment)
# Same 3-layer architecture as set1 (see configs/set1.yaml rig: for the rationale).
# LiDAR (RPLidar C1 @ ~20-25 cm) is localization-only: NO object candidates or
# distances enter this pipeline from it. Search = 2x NUROUM V11 (USB sides),
# verify = 2x IMX219 (CSI front, locked WB/exposure). Set 2 keeps its OWN models
# and thresholds; only the rig structure is shared.
rig:
  cameras:
    side_left:
      role: search
      transport: usb
      source: 0
      width: 1280
      height: 720
      hfov_deg: 90.0
      fourcc: MJPG
      buffersize: 1
    side_right:
      role: search
      transport: usb
      source: 1
      width: 1280
      height: 720
      hfov_deg: 90.0
      fourcc: MJPG
      buffersize: 1
    front_left:
      role: verify
      transport: csi
      source: 0
      width: 1280
      height: 720
      fps: 30
      hfov_deg: 62.2          # IMX219 stock lens (horizontal)
      flip_method: 0
      # Lock the ISP: the fruit classifier is colour-sensitive and the IMX219 colour
      # response already differs from Nuroum/sim - never add auto-WB drift on top.
      wbmode: 0
      aelock: true
      awblock: true
      exposure_range_ns: [5000000, 5000000]
      gain_range: [1.0, 4.0]
      isp_digital_gain_range: [1.0, 1.0]
      # IMX219 62 vs Nuroum 90 deg HFOV -> ~1.45x more px per object; scale the gates.
      gates:
        min_bbox_px: 70
        min_bbox_area_ratio: 0.012
    front_right:
      role: verify
      transport: csi
      source: 1
      width: 1280
      height: 720
      fps: 30
      hfov_deg: 62.2
      flip_method: 0
      wbmode: 0
      aelock: true
      awblock: true
      exposure_range_ns: [5000000, 5000000]
      gain_range: [1.0, 4.0]
      isp_digital_gain_range: [1.0, 1.0]
      gates:
        min_bbox_px: 70
        min_bbox_area_ratio: 0.012
  phase_rates:
    search: {search_every: 1, verify_every: 15}
    verify: {verify_every: 1, search_every: 15}

# ------------------------------------------------------- verify gate / capture (no gripper)
# Front bin capture (see set1.yaml verify: for the mechanism). CAPTURE_READY replaces
# PICKUP_READY and can only be granted by the front (verify) cameras. Wrong capture is
# still -40: the veto/margin values below stay deliberately strict.
verify:
  bin_width_m: 0.14
  verify_k: 5                 # consecutive target frames on one front cam
  verify_margin: 0.15         # set2 softmax is peaky (see margin_threshold): 0.15 binds
  veto_m: 3
  veto_margin: 0.30
  margin_factor: 0.7
  verify_bbox_px_range: [80, 560]   # 8 cm cube on IMX219 at verify range
  verify_unknown_patience: 4  # matches runtime.unknown_patience
  align_warn_min_px: 15
  align_pair_max_age: 3
  blind_handoff_bbox_px: 320
  blind_handoff_bottom_px: 6
  capture_push_limit: 6.0

# --------------------------------------------------------------------------- runtime (Jetson) - conservative, false-positive averse
runtime:
  detector_conf: 0.25
  detector_imgsz: 960           # 640 loses most 2m+ cubes; validate latency on Jetson
                                # with deployment/benchmark_latency.py before lowering
  # Long-range candidate channel (see set1.yaml): small low-conf boxes become tracked
  # approach candidates; pickup-side gates are untouched (false-positive-averse).
  far_conf: 0.10
  far_min_hits: 3
  # Only classify when the cube is close/large enough for reliable fruit reading:
  min_bbox_px: 48               # min(w,h) px (larger than set1: fruit detail needs resolution)
  min_bbox_area_ratio: 0.006
  reject_truncation_px: 3
  classifier_imgsz: 128
  # Conservative fruit acceptance (wrong pickup = -40, miss = 0). Tuned from a val sweep:
  # at conf 0.90 the per-frame unknown-leak is ~2% (vs 8.6% at 0.75) and, combined with the
  # 3-frame confirmation + conflict-reject below, the effective false-pickup rate ~ 0.
  # margin barely binds (softmax is peaky) so it's just a cheap flat-distribution guard.
  conf_threshold: 0.90          # calibrated softmax prob for top-1 fruit
  margin_threshold: 0.10        # top1 - top2 probability
  unknown_conf_relax: 0.60      # below this top-1 conf, treat as unknown regardless of class
  # Tracking + voting:
  track_iou: 0.3
  track_max_age: 12
  vote_window: 9
  min_confirmations: 3          # target-fruit votes needed for TARGET_CONFIRMED
  max_reobserve: 3              # active viewpoint changes for an unknown/uncertain cube
  unknown_patience: 4           # consecutive unknowns before requesting a viewpoint change
  # Close-range re-confirmation (info.close_reconfirmed; capture itself is gated by
  # the verify: section + front cams via runtime/capture_fsm.py):
  pickup_min_bbox_px: 110       # cube must be close (large) to count as re-confirmed
  reconfirm_within: 3           # re-seen as target within N recent frames
  conflict_reject: 2            # >=N strong non-target-fruit votes -> REJECT (never pick)
