# Set 1 detector, LONG-RANGE training mix.
#   set1_v2      = Isaac synth, real-venue arena (wood walls/floor, taegukgi stickers,
#                  tape lines), camera 0.4-3.8 m, wall-contact shots, 10% empty
#                  negative frames, Set 2 fruit-cube distractors as positives.
#                  Generate with: python sim/generate_set1_data.py --frames 9000
#   set1         = v1 synth (white-wall arena, 0.6-2.0 m) - kept for diversity.
#   set1_real    = real photos (all <1 m; near-range grounding).
#   set1_autolabel = human-verified deployment-domain webcam frames.
# val mixes v2 synth (the only source with 2 m+ boxes) + real (deployment domain);
# report per-distance-bucket metrics with training/eval_detector_by_distance.py.
path: /home/user/joon/datasets
train:
  - set1_v2/detector/images/train
  - set1/detector/images/train
  - set1_real/detector/images/train
  - set1_autolabel/detector/images/train
val:
  - set1_v2/detector/images/val
  - set1_real/detector/images/val
  - set1_autolabel/detector/images/val
names:
  0: polyhedron
