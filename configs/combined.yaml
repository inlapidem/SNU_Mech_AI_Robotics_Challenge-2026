# ============================================================================
# UNIFIED perception config - Set 1 polyhedra + Set 2 fruit cubes in ONE 4x4 m
# arena, recognized by ONE detector + ONE 9-class classifier. The real match runs
# both object families simultaneously, so this matches deployment and halves the
# Jetson inference vs the old per-set split. Legacy configs/set{1,2}.yaml are kept
# for the per-set datasets/models; this file supersedes them for the combined run.
# ============================================================================

set: combined

classes:
  # See configs/combined_classes.py (single source of truth).
  shapes: [cube, octahedron, dodecahedron, icosahedron]
  fruits: [apple, orange, banana, pineapple]
  detector: [object]                 # single detector class: any collectible
  unknown: unknown

# --------------------------------------------------------------------------- assets
assets:
  # Polyhedra (Set 1), already normalized to 0.2 m by isaac/convert_stl_to_usd.py.
  usd_dir: isaac/assets/usd
  usd_by_class:
    cube: cube.usd
    octahedron: octahedron.usd
    dodecahedron: dodecahedron.usd
    icosahedron: icosahedron.usd
  # Fruit images (Set 2). Allowlist keeps ONLY ordinary whole/unpeeled fruit with
  # canonical colours (sliced/peeled/odd source images stay in the repo, unused).
  fruit_texture_dir: assets/fruit_textures
  fruit_texture_allowlist:
    apple: [apple1.jpg, apple2.jpg, apple4.png, apple5.png, apple7.jpg, apple8.jpg,
            apple9.jpg, apple10.jpg]
    orange: [orange1.jpg, orange3.jpg, orange5.jpg, orange6.jpg, orange7.jpg,
             orange9.jpg]
    banana: [banana1.jpg, banana4.png, banana5.jpg, banana6.jpg]
    pineapple: [pineapple1.jpg, pineapple2.jpg, pineapple3.png, pineapple4.jpg,
                pineapple5.jpg, pineapple6.jpg, pineapple8.png, pineapple9.jpg,
                pineapple10.jpg]
  cube_usd: null                     # procedural box body (preferred for decals)

# --------------------------------------------------------------------------- arena
# REAL VENUE: bright wood-laminate walls AND floor, taegukgi stickers AT THE GOAL/
# STORAGE CORNER ONLY (its floor + the two adjacent walls), black tape lines.
arena:
  size_x: 4.0
  size_y: 4.0
  wall_height: 0.3
  wall_thickness: 0.05
  texture_dir: assets/arena_textures
  wood_brightness: [0.75, 1.15]
  real_texture_frac: 0.7             # per-surface prob of a real venue photo over wood_*
  floor_color: [0.78, 0.62, 0.42]    # solid-colour FALLBACK (no wood files present)
  floor_color_jitter: 0.08
  floor_roughness: [0.5, 0.9]
  wall_color: [0.78, 0.62, 0.42]
  wall_color_jitter: 0.08
  wall_roughness: [0.4, 0.8]
  stickers:                          # split by filename: *taegukgi* vs the rest
    pool: 8
    taegukgi_floor_count: [1, 2]     # goal-corner floor (>=1 every frame)
    taegukgi_wall_count: [1, 2]      # S/W goal-corner walls (>=1 every frame)
    taegukgi_size_m: [0.15, 0.30]
    goal_zone_extent_m: 0.55
    wall_extent_m: 1.0
    generic_count: [0, 3]            # non-flag labels: floor only, anywhere
    size_m: [0.08, 0.20]
  tape:
    enable: true
    width_m: [0.015, 0.025]
    color: [0.05, 0.05, 0.05]
    color_jitter: 0.05
    zone_squares: true
    pool_runs: 4
    n_random_runs: [1, 4]
  spawn_margin: 0.35

# ------------------------------------------------------------- placement/camera sampling
sampling:
  cam_dist_near: [0.3, 1.5]
  cam_dist_far: [1.5, 3.8]
  far_frac: 0.45
  wall_contact_frac: 0.35
  wall_gap_m: [0.30, 0.60]
  negative_frame_frac: 0.10
  negative_goal_frac: 0.5

# --------------------------------------------------------------------------- camera (NUROUM V11)
camera:
  width: 1280
  height: 720
  hfov_deg: 90.0
  focal_length: 10.4775
  horizontal_aperture: 20.955
  fx: 640.0
  fy: 640.0
  cx: 640.0
  cy: 360.0

# --------------------------------------------------------------------------- robot sensor rig
robot:
  base_height: 0.0
  cam_height: 0.20
  cam_forward_offset: 0.10
  cam_lateral_offset: 0.15
  cam_pitch_deg: -20.0
  cam_yaw_outward_deg: 30.0
  lidar_height: 0.30
  occlusion_proxy: false
  jitter:
    height: [-0.01, 0.01]
    pitch_deg: [-7.0, 7.0]
    yaw_deg: [-3.0, 3.0]
    roll_deg: [-2.0, 2.0]

# --------------------------------------------------------------------------- polyhedra (Set 1 objects)
objects:
  max_per_class: 2                   # copies of each shape in the pool (=8 polyhedra)
  count_range: [1, 3]                # polyhedra shown per (non-negative) frame
  real_size_m:                       # true printed sizes (longest side, m)
    cube: 0.080
    octahedron: 0.136
    dodecahedron: 0.098
    icosahedron: 0.098
  scale_range: [0.85, 1.15]          # per-frame size variation
  max_tilt_deg: 2.0                  # settle tilt of the resting face
  material:                          # white 3D-printed plastic
    base_color: [0.88, 0.88, 0.88]
    color_jitter: 0.06
    roughness: [0.35, 0.7]
    metallic: 0.0

# --------------------------------------------------------------------------- fruit cubes (Set 2 objects)
cubes:
  size_m: 0.08
  size_jitter_m: 0.005
  count_range: [1, 3]                # fruit cubes shown per (non-negative) frame
  n_plain: 0                         # dedicated plain cubes; 0 = the Set 1 'cube'
                                     # polyhedron + blank fruit-cube views supply 'cube'
  fruit_faces: 3                     # invariant real layout: top + opposite side pair
  fruit_face_names: [pz, px, nx]
  upright_tilt_deg: [-2.0, 2.0]      # upright on the bottom; small settle only
  body_material:
    base_color: [0.88, 0.88, 0.88]
    color_jitter: 0.06
    roughness: [0.35, 0.7]
    metallic: 0.0

# --------------------------------------------------------------------------- fruit label realism
fruit_label:
  scale_frac: [0.55, 0.92]
  offset_frac: 0.12
  rotation_deg: [-8, 8]
  border_frac: [0.0, 0.10]
  raise_eps_m: 0.0008
  brightness: [0.8, 1.15]            # hue-preserving (same transform per R/G/B)
  contrast: [0.85, 1.15]
  glare_prob: 0.25
  roughness: [0.3, 0.7]

# --------------------------------------------------------------------------- lighting / DR
lighting:
  sun_intensity: [2000, 9000]
  sun_pitch_deg: [-70, -20]
  sun_yaw_deg: [-180, 180]
  dome_intensity: [600, 2500]
  color_temp: [4000, 8000]

postprocess:
  motion_blur: true
  gaussian_noise: true
  exposure_jitter: true

# --------------------------------------------------------------------------- dataset output
dataset:
  root: datasets/combined_v3
  detector_subdir: detector
  classifier_subdir: classifier
  metadata_subdir: metadata
  val_ratio: 0.15
  min_frame_brightness: 12
  writer_seed: 1001                  # crop retention/aug RNG, isolated from the scene RNG

# Rules that turn a detected object into a classifier sample. Labels use VISIBLE
# evidence only. A white-cube crop (Set 1 cube OR blank fruit-cube view) -> 'cube';
# a cube with clear fruit -> that fruit; a non-cube polyhedron -> its shape; an
# unreliable crop -> 'unknown'.
labeling:
  detector_min_box_px: 8             # detector keeps boxes down to here (high recall)
  min_box_px: 34                     # min(w,h) px for a crop to be classifier-eligible
  min_visible_frac: 0.55             # 1 - occlusionRatio
  max_truncation_px: 2
  # Shapes: a reliable non-cube polyhedron crop is always its shape. A cube-shaped
  # object needs the fruit gate below to decide fruit-vs-'cube'.
  # Fruit-evidence gates (ALL must hold for a fruit label, else the cube -> 'cube'):
  min_fruit_face_facing: 0.30
  min_fruit_area_ratio: 0.08
  min_fruit_box_px: 10
  # Classifier crop augmentation:
  crop_margin_frac: [-0.08, 0.20]
  crop_shift_frac: 0.10
  crops_per_object: 2
  # Any fruit that clears the analytic gate (min_fruit_* below) -> its fruit class;
  # 1.0 keeps borderline (gate-passing but not "clear") fruit AS the fruit class too,
  # so 'cube' holds ONLY white-cube views (fruit face not visible, area_ratio ~ 0).
  # Lower it toward 0.5 to instead send half of the borderline (visible-but-faint)
  # fruit into 'cube' as a conservative hedge (then some 'cube' crops show faint fruit).
  hard_positive_keep: 1.0
  # Thin repetitive crops without changing labels/scenes/detector data:
  unknown_crop_keep:
    small: 0.10
    occluded: 0.40
    truncated: 1.0
  cube_crop_keep: 0.5                # blank-cube crops are the majority class; thin them
  background_unknown_frac: 0.05
  unknown_target_frac: [0.08, 0.20]  # QC target (reported, not forced)

render:
  rt_subframes: 32

# --------------------------------------------------------------------------- runtime
# This file is DATA-GENERATION ONLY (combined_* = unified data/synthesis). The unified
# RUNTIME/deployment config lives in configs/merged.yaml (merged_* = unified runtime/
# model): one detector + one classifier, per-family acceptance gates (fruit 0.90 /
# shape 0.60), and routing to the existing per-set decision policies by derived set
# (runtime/merged_pipeline.py). A 'cube' prediction means "white cube - approach and
# check for a fruit face" (cube_target_min_confirmations).
