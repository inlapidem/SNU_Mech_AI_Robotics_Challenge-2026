# ============================================================================
# Set 1 perception config - white 3D-printed polyhedra in a 4x4 m arena.
# Every tunable for the Isaac Sim data generation lives here so the sim files
# stay generic. Edit values to match the real robot / competition arena.
# ============================================================================

set: set1

classes:
  shapes: [cube, octahedron, dodecahedron, icosahedron]   # classifier shape classes
  detector: [polyhedron]                                   # detector: single class
  unknown: unknown                                         # classifier reject class

# Geometry assets (already normalized to 0.2 m by isaac/convert_stl_to_usd.py).
assets:
  usd_dir: isaac/assets/usd
  usd_by_class:
    cube: cube.usd
    octahedron: octahedron.usd
    dodecahedron: dodecahedron.usd
    icosahedron: icosahedron.usd

# --------------------------------------------------------------------------- arena
# REAL VENUE (confirmed by photos, overrides the draft rulebook): bright wood-laminate
# walls AND floor, taegukgi stickers AT THE GOAL/STORAGE CORNER ONLY (its floor + the
# two adjacent walls), generic labels on the floor, black tape lines on the floor.
arena:
  size_x: 4.0           # m
  size_y: 4.0           # m
  wall_height: 0.3      # m (rulebook v2: 30 cm fence)
  wall_thickness: 0.05  # m
  texture_dir: assets/arena_textures   # wood/*.png + stickers/*.png (make_arena_textures.py)
  wood_brightness: [0.75, 1.15]        # per-frame texture brightness jitter
  # Real venue photos (real_floor_*/real_wall_*) form surface-specific pools; this is
  # the per-surface per-frame probability of using one over a procedural wood_* file:
  real_texture_frac: 0.7
  # Solid-colour FALLBACK (only used when texture_dir has no wood files):
  floor_color: [0.78, 0.62, 0.42]   # light wood laminate
  floor_color_jitter: 0.08
  floor_roughness: [0.5, 0.9]
  wall_color: [0.78, 0.62, 0.42]    # walls are the same bright wood as the floor
  wall_color_jitter: 0.08
  wall_roughness: [0.4, 0.8]
  stickers:                          # split by filename: *taegukgi* vs the rest
    pool: 8                          # quads built once
    taegukgi_floor_count: [1, 2]     # goal-corner floor (at least one every frame)
    taegukgi_wall_count: [1, 2]      # S/W goal-corner walls (at least one every frame)
    taegukgi_size_m: [0.15, 0.30]
    goal_zone_extent_m: 0.55         # floor taegukgi lie within this of the corner
    wall_extent_m: 1.0               # wall taegukgi within this along-wall of the corner
    generic_count: [0, 3]            # non-flag labels: floor only, anywhere
    size_m: [0.08, 0.20]
  tape:                              # black floor tape (zone boundaries)
    enable: true
    width_m: [0.015, 0.025]
    color: [0.05, 0.05, 0.05]
    color_jitter: 0.05
    zone_squares: true               # 40x40 cm start/storage outlines in two corners
    pool_runs: 4
    n_random_runs: [1, 4]            # extra straight runs across the floor per frame
  spawn_margin: 0.35    # legacy placement half-extent (kept for compatibility)

# ------------------------------------------------------------- placement/camera sampling
sampling:
  cam_dist_near: [0.4, 1.5]   # m, classify range
  cam_dist_far: [1.5, 3.8]    # m, long-range detection views
  far_frac: 0.45              # fraction of frames drawn from the far range
  wall_contact_frac: 0.35     # frames with a wall pulled right behind the object cluster
  wall_gap_m: [0.30, 0.60]    # cluster-centre -> wall distance in those frames
  negative_frame_frac: 0.10   # object-free frames (wood/sticker/tape only), empty labels
  negative_goal_frac: 0.5     # of those, fraction aimed at the goal-corner taegukgi

# --------------------------------------------------------------------------- camera (NUROUM V11)
camera:
  width: 1280
  height: 720
  hfov_deg: 90.0
  focal_length: 10.4775       # mm  (HFOV 90 with horizontal_aperture below)
  horizontal_aperture: 20.955 # mm
  # Intrinsics (for reference / metadata): fx=fy=640, cx=640, cy=360
  fx: 640.0
  fy: 640.0
  cx: 640.0
  cy: 360.0

# --------------------------------------------------------------------------- robot sensor rig
# Camera mounts are defined relative to base_link. Two side cameras aimed
# forward-outward. Per-frame mount jitter simulates real mounting error.
robot:
  base_height: 0.0            # base_link z on the floor
  cam_height: 0.20            # m  (RGB cameras)
  cam_forward_offset: 0.10    # m  (+x, ahead of base_link)
  cam_lateral_offset: 0.15    # m  (|y| to each side)
  cam_pitch_deg: -20.0        # downward
  cam_yaw_outward_deg: 30.0   # left=+30, right=-30 (forward-outward)
  lidar_height: 0.30          # m  (metadata only; not used for shape)
  occlusion_proxy: false      # robot-body occluders (disabled for now)
  # Mount-error randomization (added per frame):
  jitter:
    height: [-0.01, 0.01]     # m
    pitch_deg: [-7.0, 7.0]    # -> effective pitch -13..-27 deg
    yaw_deg: [-3.0, 3.0]
    roll_deg: [-2.0, 2.0]

# --------------------------------------------------------------------------- objects / placement
objects:
  max_per_class: 1            # pool = max_per_class * 4 shapes
  # Real printed sizes (longest side, metres) from the STL extents. Each shape is rendered
  # at its TRUE size so apparent sizes match the real robot view (octahedron is ~1.7x a cube).
  real_size_m:
    cube: 0.080
    octahedron: 0.136
    dodecahedron: 0.098
    icosahedron: 0.098
  scale_range: [0.85, 1.15]   # per-frame size variation on top of real_size_m
  # Set 2 fruit cubes appear in the SAME arena during the real match. They are added
  # as detector positives (a cube candidate is a cube candidate) but NEVER become
  # shape-classifier crops (see generate_set1_data + cross-set unknown injection).
  fruit_cube_distractors: 2
  # Placement: each solid RESTS on the floor - random large face down + settle tilt,
  # ground contact computed from the mesh vertices (sim/poly_assets), non-overlapping.
  # White 3D-printed plastic material (UsdPreviewSurface).
  material:
    base_color: [0.88, 0.88, 0.88]
    color_jitter: 0.06        # slight off-white variation per frame
    roughness: [0.35, 0.7]
    metallic: 0.0

# --------------------------------------------------------------------------- lighting / domain randomization
lighting:
  sun_intensity: [2000, 9000]
  sun_pitch_deg: [-70, -20]
  sun_yaw_deg: [-180, 180]
  dome_intensity: [600, 2500]
  color_temp: [4000, 8000]    # K

postprocess:
  # Applied as label-preserving augmentation at TRAIN time (not in sim) unless noted.
  motion_blur: true
  gaussian_noise: true
  exposure_jitter: true

# --------------------------------------------------------------------------- dataset output
dataset:
  root: datasets/set1_v3      # v3 = real venue photos + exact floor resting + goal-corner
                              # taegukgi policy (v2 kept - the LR training mixes cite it)
  detector_subdir: detector       # images/{train,val} + labels/{train,val}
  classifier_subdir: classifier   # {train,val}/<class>/*.png
  metadata_subdir: metadata       # per-frame json
  val_ratio: 0.15
  min_frame_brightness: 12        # drop render-glitch (near-black) frames

# Rules that turn a detected object into a classifier sample vs `unknown`.
labeling:
  # A crop becomes its true shape label only if ALL hold; else -> unknown.
  min_box_px: 32                  # min(w,h) in pixels for a valid shape crop
  min_visible_frac: 0.55          # 1 - occlusionRatio
  max_truncation_px: 2            # box edge this close to image border = truncated
  # Detector keeps boxes down to this size (high recall, incl. tiny/distant):
  detector_min_box_px: 8
  # Classifier crop augmentation (simulate detector imperfection):
  crop_margin_frac: [-0.08, 0.20] # negative=tight, positive=loose
  crop_shift_frac: 0.10           # random center shift
  crops_per_object: 2
  # Fraction of frames that also emit a background 'unknown' crop:
  background_unknown_frac: 0.3

render:
  rt_subframes: 32

# --------------------------------------------------------------------------- sensor rig (deployment)
# 3-layer sensor architecture (2026-07). The RPLidar C1 sits at ~20-25 cm so its scan
# plane passes ABOVE every object: LiDAR is localization/wall-mapping ONLY and the
# perception pipeline takes NO object candidates or distances from it (world_pos stays
# an optional external input). Cameras carry the whole recognition task:
#   role: search  = 2x NUROUM V11 (USB, sides, yawed forward-outward 30-45 deg).
#                   Runs the detect->classify->track->vote pipeline, round-robin.
#                   Drives SEARCHING -> FAR_CANDIDATE -> TARGET_CONFIRMED.
#   role: verify  = 2x IMX219 (CSI, front). Final anti-misidentification gate: the SAME
#                   detector+classifier run on these frames, but their evidence is only
#                   used by the verify/veto/alignment rules (never for search states).
# Any subset of the rig may be connected (bench tests): missing cameras warn and are
# skipped. CLI can override any source (--cam NAME=SPEC) or role (--role NAME=ROLE).
rig:
  cameras:
    side_left:
      role: search
      transport: usb          # cv2.VideoCapture(index) + MJPG width x height forced
      source: 0               # /dev/video index
      width: 1280
      height: 720
      hfov_deg: 90.0
      fourcc: MJPG
      buffersize: 1
    side_right:
      role: search
      transport: usb
      source: 1
      width: 1280
      height: 720
      hfov_deg: 90.0
      fourcc: MJPG
      buffersize: 1
    front_left:
      role: verify
      transport: csi          # nvarguscamerasrc via GStreamer (Jetson only)
      source: 0               # sensor-id
      width: 1280
      height: 720
      fps: 30
      hfov_deg: 62.2          # IMX219 stock lens (horizontal)
      flip_method: 0
      # Domain-gap control: do NOT leave the ISP on auto. Lock white balance and
      # exposure so the front-cam distribution stays constant across the match.
      wbmode: 0               # nvarguscamerasrc wbmode (0 = off/manual, 1 = auto)
      aelock: true            # freeze auto-exposure
      awblock: true           # freeze auto-white-balance (belt and braces with wbmode 0)
      exposure_range_ns: [5000000, 5000000]   # fixed exposure (ns); tune on the venue
      gain_range: [1.0, 4.0]
      isp_digital_gain_range: [1.0, 1.0]
      # Optional per-camera pixel-gate overrides (defaults below are Nuroum 1280x720
      # values from runtime:). IMX219 has a narrower HFOV (62 vs 90 deg) so an object
      # at the same distance is ~1.45x wider in pixels; raise gates accordingly.
      gates:
        min_bbox_px: 58
        min_bbox_area_ratio: 0.008
    front_right:
      role: verify
      transport: csi
      source: 1
      width: 1280
      height: 720
      fps: 30
      hfov_deg: 62.2
      flip_method: 0
      wbmode: 0
      aelock: true
      awblock: true
      exposure_range_ns: [5000000, 5000000]
      gain_range: [1.0, 4.0]
      isp_digital_gain_range: [1.0, 1.0]
      gates:
        min_bbox_px: 58
        min_bbox_area_ratio: 0.008
  # Orin Nano load management: per-phase polling periods (in loop ticks; 1 = every
  # tick, N = every Nth tick, 0 = off). SEARCH runs the Nuroum pair round-robin at
  # full rate with the front cams idling; VERIFY inverts that.
  phase_rates:
    search: {search_every: 1, verify_every: 15}
    verify: {verify_every: 1, search_every: 15}

# ------------------------------------------------------- verify gate / capture (no gripper)
# The robot has NO gripper: a front bin (inner width bin_width_m) is pushed over the
# object; funnel wings at the mouth absorb small alignment error; an IR sensor deep
# inside the bin confirms deep seating. PICKUP_READY is REDEFINED as CAPTURE_READY =
# "verify gate passed + laterally aligned, safe to push in". Promotion happens ONLY
# from verify-role (front) cameras.
verify:
  bin_width_m: 0.14           # bin inner width; alignment allowance derives from this
  verify_k: 5                 # consecutive target frames on one front cam to pass
  verify_margin: 0.25         # calibrated top1-top2 margin required for those frames
  veto_m: 3                   # consecutive strong non-target frames -> VERIFY_REJECTED
  veto_margin: 0.35           # margin for a veto observation (high-confidence wrongness)
  margin_factor: 0.7          # fraction of allowed_offset_px actually accepted
  verify_bbox_px_range: [64, 560]   # plausible bbox width on a front cam at verify range
  verify_unknown_patience: 4  # consecutive unknown frames -> micro viewpoint adjust request
  align_warn_min_px: 15       # startup WARNING if allowed_offset_px < this at max bbox
  align_pair_max_age: 3       # two-cam alignment needs both cams seen within N updates
  blind_handoff_bbox_px: 320  # bbox height >= this -> object at the bin lip -> go blind
  blind_handoff_bottom_px: 6  # bbox bottom within N px of frame bottom -> go blind
  capture_push_limit: 11.0    # s in BLIND_CAPTURE without IR seating -> CAPTURE_MISSED (2026-07-17: 6→11, navigation 검출미스 스윕 — mission capture_push_limit_s 와 동기)

# --------------------------------------------------------------------------- runtime (Jetson)
runtime:
  detector_conf: 0.25           # low -> high recall; classifier rejects junk
  detector_imgsz: 960           # 640 loses most 2m+ objects; validate latency on Jetson
                                # with deployment/benchmark_latency.py before lowering
  # Long-range candidate channel: below detector_conf but above far_conf, a SMALL box
  # (too small to classify anyway) still enters the tracker as an approach candidate.
  # Track persistence (far_min_hits) debounces it, so navigation gets far targets
  # without loosening the pickup-side false-positive gates at all.
  far_conf: 0.10
  far_min_hits: 3               # consecutive-ish sightings before FAR_CANDIDATE is reported
  # Only classify a crop when the object is close/large enough to be reliable:
  min_bbox_px: 40               # min(w,h) in pixels
  min_bbox_area_ratio: 0.004    # bbox area / image area
  reject_truncation_px: 3       # skip detections this close to image border
  classifier_imgsz: 128
  # Conservative shape acceptance:
  conf_threshold: 0.60          # calibrated softmax prob for top-1
  margin_threshold: 0.20        # top1 - top2 probability
  # Tracking + voting:
  track_iou: 0.3
  track_max_age: 10             # frames a track survives unseen
  vote_window: 7                # recent classifications considered
  min_confirmations: 3          # target votes needed for TARGET_CONFIRMED
  # Set 2 cubes are visually IDENTICAL to the Set 1 cube when no fruit face shows, so
  # a 'cube' target needs more evidence than the other shapes (multi-view; the fruit
  # side may be hidden). Cross-set unknown injection teaches the classifier that a
  # fruit-showing cube is NOT a Set 1 cube.
  cube_target_min_confirmations: 5
  max_reobserve: 6              # approach/re-observe attempts before giving up
  # Close-range re-confirmation (info.close_reconfirmed; capture itself is gated by
  # the verify: section + front cams via runtime/capture_fsm.py):
  pickup_min_bbox_px: 90        # object must be close (large) to count as re-confirmed
  reconfirm_within: 3           # must be re-seen as target within N recent frames
